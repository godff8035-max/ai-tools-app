<!DOCTYPE html>
<html>
<head>
  <title>AI Caption Generator</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #38bdf8;
      border: none;
      color: black;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    input {
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    #output {
      margin-top: 15px;
      padding: 15px;
      background: #0f172a;
      border-radius: 10px;
      min-height: 60px;
    }

    #credits {
      margin-top: 10px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .small-btn {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <h2>🚀 AI Caption</h2>
    <button id="logoutBtn" class="small-btn hidden" onclick="logout()">Logout</button>
  </div>

  <button id="loginBtn" onclick="login()">Login with Google</button>

  <p id="credits">Credits: 0</p>

  <input id="input" placeholder="Enter topic (travel, gym, etc)">
  
  <button onclick="generate()">Generate Caption</button>

  <button id="earnBtn" class="hidden">🎥 Watch Ad = +1 Credit</button>

  <div id="output"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="app.js"></script>

</body>
</html>
